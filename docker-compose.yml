services:

  postgres:
    image: postgres:16-alpine
    container_name: cashbackengine-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cashbackengine}
      POSTGRES_USER: ${POSTGRES_USER:-cashback_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cashback_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cashback_user} -d ${POSTGRES_DB:-cashbackengine}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cashbackengine-service:
    build:
      context: .
      dockerfile: cashbackengine-service/Dockerfile
    container_name: cashbackengine-service
    ports:
      - "${SERVICE_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-cashbackengine}
      POSTGRES_USER: ${POSTGRES_USER:-cashback_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cashback_pass}
      JWT_SECRET: ${JWT_SECRET:-Y2FzaGJhY2tlbmdpbmVzdXBlcnNlY3JldGp3dGtleTMyY2hhcnNsb25n}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-noreply@cashbackengine.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  cashbackengine-ui:
    build:
      context: .
      dockerfile: cashbackengine-ui/Dockerfile
    container_name: cashbackengine-ui
    ports:
      - "${UI_PORT:-80}:80"
    depends_on:
      cashbackengine-service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
